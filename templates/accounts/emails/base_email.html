<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block email_title %}foodOnline{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f4f4f4;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
          <tr>
            <td style="padding: 40px 30px;">
              {% block email_content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding: 20px 30px; border-top: 1px solid #eee; font-size: 12px; color: #888; text-align: center;">
              — foodOnline
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

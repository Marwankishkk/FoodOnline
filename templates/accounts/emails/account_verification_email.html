{% extends 'accounts/emails/base_email.html' %}

{% block email_title %}Activate your account – foodOnline{% endblock %}

{% block email_content %}
<h2 style="margin: 0 0 16px; font-size: 22px; color: #333; text-align: center;">Activate Your Account</h2>
<p style="margin: 0 0 24px; font-size: 16px; color: #555; text-align: center; line-height: 1.5;">Please verify your email address to activate your account.</p>
<div style="text-align: center;">
  <a href="http://{{ domain }}{% url 'activate' uidb64=uid token=token %}" style="display: inline-block; padding: 14px 28px; background-color: #dc3545; color: #ffffff !important; text-decoration: none; font-size: 16px; font-weight: 600; border-radius: 6px;">Activate Now</a>
</div>
{% endblock %}

{% extends 'accounts/emails/base_email.html' %}

{% block email_title %}Reset your password – foodOnline{% endblock %}

{% block email_content %}
<h2 style="margin: 0 0 16px; font-size: 22px; color: #333; text-align: center;">Reset Your Password</h2>
<p style="margin: 0 0 24px; font-size: 16px; color: #555; text-align: center; line-height: 1.5;">Please click the button below to reset your password.</p>
<div style="text-align: center;">
  <a href="http://{{ domain }}{% url 'reset_password_validate' uidb64=uid token=token %}" style="display: inline-block; padding: 14px 28px; background-color: #dc3545; color: #ffffff !important; text-decoration: none; font-size: 16px; font-weight: 600; border-radius: 6px;">Reset Password</a>
</div>
{% endblock %}
